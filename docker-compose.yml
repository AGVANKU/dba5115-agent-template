version: '3.8'

services:
  azurite:
    platform: linux/arm64
    image: mcr.microsoft.com/azure-storage/azurite
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite-data:/data
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --location /data
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "10000"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  function-app:
    depends_on:
      azurite:
        condition: service_healthy
    platform: linux/arm64
    build:
      context: .
      platforms:
        - linux/arm64
    ports:
      - "7071:80"
    env_file:
      - .env
    environment:
      - AzureWebJobsStorage=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1;
      - FUNCTIONS_WORKER_RUNTIME=python
      - PYTHON_ISOLATE_WORKER_DEPENDENCIES=1
      - AzureWebJobsSecretStorageType=blob
      - AZURE_FUNCTIONS_ENVIRONMENT=Development
      - AzureFunctionsWebHost__hostid=localdev
      - AzureWebJobsScriptRoot=/home/site/wwwroot
      - WEBSITE_HOSTNAME=localhost:7071
    volumes:
      - ./:/home/site/wwwroot
    command: /azure-functions-host/Microsoft.Azure.WebJobs.Script.WebHost

volumes:
  azurite-data:
