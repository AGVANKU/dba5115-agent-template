{% if alert_type == 'warning' %}
<div style="margin: 20px 0; padding: 20px; background-color: #fff3cd; border-left: 4px solid #ffc107; border-radius: 5px;">
    {% if title %}
    <h3 style="margin: 0 0 10px 0; font-size: 18px; font-weight: 600; color: #333;">⚠️ {{ title }}</h3>
    {% endif %}
    <p style="margin: 0; font-size: 15px; color: #333;">{{ message }}</p>
</div>
{% elif alert_type == 'error' %}
<div style="margin: 20px 0; padding: 20px; background-color: #f8d7da; border-left: 4px solid #dc3545; border-radius: 5px;">
    {% if title %}
    <h3 style="margin: 0 0 10px 0; font-size: 18px; font-weight: 600; color: #333;">❌ {{ title }}</h3>
    {% endif %}
    <p style="margin: 0; font-size: 15px; color: #333;">{{ message }}</p>
</div>
{% else %}
<div style="margin: 20px 0; padding: 20px; background-color: #d1ecf1; border-left: 4px solid #17a2b8; border-radius: 5px;">
    {% if title %}
    <h3 style="margin: 0 0 10px 0; font-size: 18px; font-weight: 600; color: #333;">ℹ️ {{ title }}</h3>
    {% endif %}
    <p style="margin: 0; font-size: 15px; color: #333;">{{ message }}</p>
</div>
{% endif %}
